<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Historial | CMS By DR Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../admin/css/admin.css">
    <link rel="stylesheet" href="history.css">
</head>

<body>
    <section id="auth-screen" class="auth-screen">
        <section class="panel auth-card">
            <div class="auth-card-head">
                <div class="admin-brand">Historial</div>
            </div>
            <form id="login-form" class="stack">
                <label class="field">
                    <span>Email</span>
                    <input id="login-email" type="email" autocomplete="email" required>
                </label>
                <label class="field">
                    <span>Contraseña</span>
                    <input id="login-password" type="password" autocomplete="current-password" required>
                </label>
                <button class="button button-primary" type="submit">Iniciar sesión</button>
            </form>
            <p id="auth-message" class="status-text" aria-live="polite"></p>
        </section>
    </section>

    <div id="history-shell" class="admin-shell hidden">
        <header class="admin-navbar">
            <div class="admin-navbar__brand">CMS By DR Technologies</div>

            <div class="admin-navbar__actions" aria-label="Acciones de historial">
                <div class="admin-action-cluster">
                    <a class="action-button action-button--primary" href="/admin/">
                        <i class="bi bi-arrow-left"></i>
                        <span>CMS</span>
                    </a>
                    <div class="admin-navbar__user">
                        <button id="user-menu-button" class="user-menu-button" type="button" aria-label="Menú de usuario" aria-expanded="false">
                            <i class="bi bi-person-circle"></i>
                        </button>
                        <section id="session-card" class="user-menu hidden">
                            <div class="user-menu__header">
                                <div class="user-menu__name-wrap">
                                    <div id="session-user" class="user-menu__name"></div>
                                </div>
                            </div>
                            <div class="user-menu__actions">
                                <button id="language-button" class="user-menu__item" type="button" aria-pressed="false">
                                    <span class="user-menu__item-icon"><i class="bi bi-translate"></i></span>
                                    <span class="user-menu__item-label">Idioma</span>
                                    <span id="language-switch" class="user-menu__switch" aria-hidden="true">
                                        <span class="user-menu__switch-option user-menu__switch-option--active">es</span>
                                        <span class="user-menu__switch-option">en</span>
                                    </span>
                                </button>
                                <button id="logout-button" class="user-menu__item user-menu__item--danger" type="button">
                                    <span class="user-menu__item-icon"><i class="bi bi-box-arrow-right"></i></span>
                                    <span>Cerrar sesión</span>
                                </button>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </header>

        <main class="admin-main history-main">
            <section id="access-denied" class="panel hidden">
                <h1 class="panel-title">Acceso denegado</h1>
                <p class="admin-muted">Tu usuario está autenticado, pero no existe en <code>admins/{uid}</code>.</p>
            </section>

            <section id="history-app" class="history-app hidden">
                <section class="panel history-panel">
                    <div class="panel-header">
                        <div>
                            <h1 class="panel-title">Versiones publicadas</h1>
                            <p class="admin-muted">Restaura una publicación anterior directamente a draft y published.</p>
                        </div>
                    </div>
                    <p id="history-message" class="status-text" aria-live="polite"></p>
                    <div id="history-list" class="history-list"></div>
                </section>
            </section>
        </main>
    </div>

    <script type="module" src="history-main.js"></script>
</body>

</html>
