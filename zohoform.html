<script type='text/javascript'>
	function onSignupReady() {

		$.validator.addMethod('required', function (g, e) {
			if (e.value === '') {
				return false;
			}
			return true
		});

		$('#signupform').zaSignUp({
			x_signup: {
				captcha_required: true
			},
			validator: {
				rules: {
					c_First_Name: {
						required: true
					},
					c_Last_Name: {
						required: true
					},
					c_Phone: {
						required: true
					},
					c_Mailing_Street: {
						required: true
					},
					c_Mailing_City: {
						required: true
					},
					c_Mailing_Country: {
						required: true
					},

				},
				messages: {
					c_First_Name: {
						required: 'Escriba el Nombre'
					},
					c_Last_Name: {
						required: 'Escriba el Apellidos'
					},
					c_Phone: {
						required: 'Escriba el Tel\xE9fono'
					},
					c_Mailing_Street: {
						required: 'Escriba el Domicilio\x20para\x20correspondencia'
					},
					c_Mailing_City: {
						required: 'Escriba el Ciudad\x20para\x20correspondencia'
					},
					c_Mailing_Country: {
						required: 'Escriba el Pa\xEDs\x20para\x20correspondencia'
					},
				}
			},
			onsubmit: function () {
				return validateFormData();
			},
			handleSignuptracking: function (data) {
				var csrf = "";
				var cookieArray = document.cookie.split(";");
				for (var i = 0; i < cookieArray.length; i++) {
					if (cookieArray[i].includes("crmcsr")) {
						csrf = cookieArray[i].split("=")[1]
					}
				} var formData = getAllFormInputJson();
				formData['form_data'][0]['enVpZA=='] = data.zuid;
				$.ajax({
					'type': 'POST',
					'url': 'https://crm.cargoxpresscorp.com/crm/v6/settings/portals/CargoXpressWorldCorp/actions/submit_form_data',
					'data': JSON.stringify(formData),
					'headers': {
						"X-ZCSRF-TOKEN": "crmcsrfparam=" + csrf,
						"X-CRMPORTAL": 'CargoXpressWorldCorp', "X-CRM-ORG": '870837918', 'X-ZOHO-SERVICE': 'crm'
					},
					'async': false
				});
			},
			oncomplete: function (state) {
				if (state == $.fn.zaSignUp.SIGNUP_STATE.ACCOUNT_CREATED) {
					showLoader();
				}
				if (state == $.fn.zaSignUp.SIGNUP_STATE.OTP_ERROR) {
					hideLoader();
				}
				if (state == $.fn.zaSignUp.SIGNUP_STATE.OTP_INITIATED) {
					var otpElements = document.getElementsByClassName('cPT_input');
					for (var i = 0; i < otpElements.length; i++) {
						otpElements[i].value = '';
					}
					changeBackground("#edf0f4");
				}
				if (state == $.fn.zaSignUp.SIGNUP_STATE.OTP_ERROR || state == $.fn.zaSignUp.SIGNUP_STATE.ERROR) {
					document.getElementsByName('otpfield')[0].disabled = false;
				}
			}
		});
	}

	function showHidePassword() {
		var element = document.getElementById('password');
		var type = document.getElementById('password').type;
		if (type === 'password') {
			element.type = 'text';

	} function getAllFormInputJson() {
		var inputs = document.querySelectorAll('input,select,textarea');
		var paramsJson = {}, formData = {};
		for (i = 0; i < inputs.length; i++) {
			var fieldlabel = '';
			if (inputs[i].name !== "" && !inputs[i].name.includes("password")) {
				fieldlabel = inputs[i].getAttribute('crmlabel') !== null ? inputs[i].getAttribute('crmlabel') : inputs[i].name;
				if (fieldlabel.startsWith("c_")) {
					fieldlabel = fieldlabel.replace(/c_/i, "");

				}

				if (inputs[i].tagName === 'SELECT') {
					var selected = ''
					for (var option of inputs[i].options) {
						if (option.selected) {
							selected += option.value + ';';
						}
					}
					selected = selected.replace(/;([^;]*)$/, '$1')
					paramsJson[fieldlabel] = selected
				} else if (inputs[i].type === 'checkbox' && inputs[i].checked == false) { paramsJson[fieldlabel] = ''; } else {
					paramsJson[fieldlabel] = inputs[i].value
				}
			}
		}
		return { 'form_data': [paramsJson] }
	}
