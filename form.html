    function showHidePassword() {

        var type = document.getElementById('password').type;

        showLoader();

        var otpValue = ""

        document.getElementById('resendotp').classList.remove('resend_timer');
    } function getAllFormInputJson() {
        var inputs = document.querySelectorAll('input,select,textarea');
        var paramsJson = {}, formData = {};
        for (i = 0; i < inputs.length; i++) {
            var fieldlabel = '';
            if (inputs[i].name !== "" && !inputs[i].name.includes("password")) {
                fieldlabel = inputs[i].getAttribute('crmlabel') !== null ? inputs[i].getAttribute('crmlabel') : inputs[i].name;
                if (fieldlabel.startsWith("c_")) {
                    fieldlabel = fieldlabel.replace(/c_/i, "");

                }

                if (inputs[i].tagName === 'SELECT') {
                    var selected = ''
                    for (var option of inputs[i].options) {
                        if (option.selected) {
                            selected += option.value + ';';
                        }
                    }
                    selected = selected.replace(/;([^;]*)$/, '$1')
                    paramsJson[fieldlabel] = selected
                } else if (inputs[i].type === 'checkbox' && inputs[i].checked == false) { paramsJson[fieldlabel] = ''; } else {
                    paramsJson[fieldlabel] = inputs[i].value
                }
            }
        }
        return { 'form_data': [paramsJson] }
    }

                    var portalStatus = resp.responseJSON.code === 'CANNOT_PROCESS' ? 'portalFormAvailable' : 'portalFormStatus';
                    window.location.replace(window.location.origin + "/portal/CargoXpressWorldCorp/crm/PortalErrorPage.sas?" + portalStatus + "=false&rid=493a75de338ce1fd49c64d9a2120872546f703651422b66f1360fc6b9dc1ab88545b8f8769acec505dcc27886832dfebgid26b0f108c23c6a0804035c52400a52236f0cf15835f172567b881e55514dc67f");
                }
                else if (resp.responseJSON.code === 'MANDATORY_NOT_FOUND') {
                    document.getElementById('form_sub_err').style.display = 'block';
                }
                else {
                    var errorArr = [];
                    errorArr = resp.responseJSON.details.errors;
                    for (var i = 0; i < errorArr.length; i++) {
                        var fieldlabel = errorArr[i].details.api_name;
